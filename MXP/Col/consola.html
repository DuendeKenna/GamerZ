<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juegos Consola</title>
    <style>
        body {
            background-color: transparent;
            /* Allows modal background to show through */
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 24px;
        }

        .header-container {
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        h2 {
            margin: 0;
            font-size: 24px;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }

        .game-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 16px;
            transition: all 0.2s ease;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .game-card:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.5);
        }

        .game-icon {
            width: 32px;
            height: 32px;
            object-fit: contain;
            opacity: 0.8;
        }

        .game-title {
            font-weight: 600;
            font-size: 15px;
            line-height: 1.3;
        }

        /* Scrollbars matching xp look */
        ::-webkit-scrollbar {
            width: 12px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 6px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 6px;
            border: 2px solid transparent;
            background-clip: padding-box;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.5);
            border: 2px solid transparent;
            background-clip: padding-box;
        }

        .loading {
            text-align: center;
            padding: 40px;
            font-size: 18px;
            font-style: italic;
            color: #aaa;
        }
    </style>
</head>

<body>
    <div class="header-container">
        <h2><img id="consoleIcon" src="" style="height: 48px; display: none;" alt="Console Logo"><span
                id="titleText">Cargando...</span></h2>
    </div>

    <div id="gameGrid" class="grid">
        <div class="loading">Cargando juegos...</div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const rawConsoleId = params.get('c') || 'megadrive';
        // For right now, everything loads megadrive.xml as requested by user
        const fetchConsoleId = 'megadrive';

        // Show the logo and nice title
        document.getElementById('titleText').innerText = `Catálogo de ${rawConsoleId.toUpperCase()}`;
        document.getElementById('consoleIcon').src = `../Shots/consolas/${rawConsoleId}.svg`;
        document.getElementById('consoleIcon').style.display = 'block';

        fetch(`../Shots/consolas/${fetchConsoleId}.xml`)
            .then(response => {
                if (!response.ok) throw new Error("No XML found");
                return response.text();
            })
            .then(xmlStr => {
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(xmlStr, "application/xml");

                const grid = document.getElementById('gameGrid');
                grid.innerHTML = ''; // clear loading

                const games = xmlDoc.querySelectorAll('Game');

                if (games.length === 0) {
                    grid.innerHTML = '<div class="loading">No hay juegos listados para esta consola todavía.</div>';
                    return;
                }

                games.forEach(game => {
                    const name = game.textContent;
                    if (!name || name.trim() === '') return;

                    const card = document.createElement('div');
                    card.className = 'game-card';
                    card.innerHTML = `
                        <img src="../XP_Icons/Game Controller.webp" class="game-icon" alt="icon" onerror="this.onerror=null; this.src='data:image/svg+xml;utf8,<svg xmlns=\\'http://www.w3.org/2000/svg\\' viewBox=\\'0 0 24 24\\'><path d=\\'M21 6H3c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-10 7H8v3H6v-3H3v-2h3V8h2v3h3v2zm4.5 2c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm4-3c-.83 0-1.5-.67-1.5-1.5S18.67 9 19.5 9s1.5.67 1.5 1.5-.67 1.5-1.5 1.5z\\' fill=\\'%23ffffff\\'/></svg>'">
                        <div class="game-title">${name}</div>
                    `;
                    grid.appendChild(card);
                });
            })
            .catch(error => {
                document.getElementById('gameGrid').innerHTML = '<div class="loading">Ocurrió un error cargando el catálogo o el archivo no está disponible.</div>';
                console.error("Error fetching XML:", error);
            });
    </script>
</body>

</html>
