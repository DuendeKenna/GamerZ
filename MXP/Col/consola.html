<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juegos Consola</title>
    <style>
        body {
            background-color: transparent;
            color: #e0e0e0;
            font-family: 'Verdana', sans-serif;
            margin: 0;
            padding: 24px;
        }

        .header-container {
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;

            position: sticky;
            top: 0;
            background-color: #00112e;
            /* dark blue to match overall xp style container, or translucent depending on context */
            z-index: 100;
            padding: 10px 0 20px 0;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
        }

        h2 {
            margin: 0;
            font-size: 24px;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* Search Bar Styles from pc.html */
        .search-area {
            display: flex;
            align-items: center;
        }

        input {
            display: inline-block;
            background: #fff;
            padding: .6rem;
            border-radius: 0.3rem;
            width: 300px;
            border: 0.1rem solid #BDBDBD;
            outline: none;
            height: 1.2rem;
            font-family: 'Comic Sans MS', 'Comic Sans', cursive;
            vertical-align: middle;
            color: #333;
        }

        input::placeholder {
            font-family: 'Comic Sans MS', 'Comic Sans', cursive;
            color: #888;
        }

        input:hover,
        input:focus {
            border: 0.1rem solid #0F52BA !important;
        }

        #searchbutton {
            display: inline-block;
            cursor: pointer;
            vertical-align: middle;
            margin-left: 8px;
            width: 32px;
            height: 32px;
            transition: transform 0.1s;
        }

        #searchbutton:hover {
            transform: scale(1.1);
        }

        /* Table Styles */
        .table-container {
            overflow-x: auto;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 12px 16px;
            font-weight: bold;
            cursor: pointer;
            user-select: none;
            border-bottom: 2px solid rgba(255, 255, 255, 0.2);
            transition: background 0.2s;
            white-space: nowrap;
        }

        th:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        th.sort-asc::after {
            content: " ▲";
            font-size: 0.8em;
        }

        th.sort-desc::after {
            content: " ▼";
            font-size: 0.8em;
        }

        td {
            padding: 12px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 14px;
        }

        tr {
            transition: background 0.1s;
        }

        tr:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        /* Scrollbars matching xp look */
        ::-webkit-scrollbar {
            width: 12px;
            height: 12px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 6px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 6px;
            border: 2px solid transparent;
            background-clip: padding-box;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.5);
            border: 2px solid transparent;
            background-clip: padding-box;
        }

        .loading {
            text-align: center;
            padding: 40px;
            font-size: 18px;
            font-style: italic;
            color: #aaa;
        }

        .rating-stars {
            color: #ffd700;
        }

        .stars-outer {
            display: inline-block;
            position: relative;
            color: #4a4a4a;
            font-size: 16px;
        }

        .stars-inner {
            position: absolute;
            top: 0;
            left: 0;
            white-space: nowrap;
            overflow: hidden;
            width: 0;
            color: #ffd700;
        }

        /* Mobile specific: hide everything but name on small screens */
        @media (max-width: 600px) {

            th:not(:first-child),
            td:not(:first-child) {
                display: none;
            }

            .header-container h2 {
                font-size: 18px;
            }

            input {
                width: 150px;
            }
        }
    </style>
</head>

<body>
    <div class="header-container">
        <h2>
            <span id="titleText">Cargando...</span>
            <img id="consoleIcon" src="" style="height: 48px; display: none; margin-left: 8px;" alt="Console Logo">
        </h2>
        <div class="search-area">
            <input type="text" id="searchInput" placeholder="¿Cuál buscás?" onkeyup="filterGames()">
            <img src="../XP_Icons/Search.webp" onclick="filterGames()" id="searchbutton" alt="Buscar">
        </div>
    </div>

    <div class="table-container">
        <table id="gamesTable">
            <thead>
                <tr>
                    <th onclick="sortTable(0, 'string')">Nombre</th>
                    <th onclick="sortTable(1, 'string')">Género</th>
                    <th onclick="sortTable(2, 'date')">Lanzamiento</th>
                    <th onclick="sortTable(3, 'number')">Jugadores</th>
                    <th onclick="sortTable(4, 'number')">Clasificación</th>
                </tr>
            </thead>
            <tbody id="gamesTbody">
                <tr>
                    <td colspan="5" class="loading">Cargando juegos...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const consoleId = params.get('c') || 'megadrive'; // Fallback to megadrive

        let sortDirection = false;
        let gameData = [];

        // Show the logo and title
        document.getElementById('titleText').innerText = '';
        document.getElementById('consoleIcon').src = `../Shots/consolas/${consoleId}.svg`;
        document.getElementById('consoleIcon').style.display = 'block';

        function formatDate(dateString) {
            if (!dateString) return '-';
            // EmulationStation date format: YYYYMMDDTHHMMSS
            if (dateString.length >= 4) {
                const year = dateString.substring(0, 4);
                return `${year}`;
            }
            return dateString;
        }

        function formatRating(ratingStr) {
            if (!ratingStr) return '-';
            let val = parseFloat(ratingStr);
            if (isNaN(val)) return '-';

            let outOfFive = val * 5;
            let percentage = val * 100;

            return `
                <div style="display: flex; align-items: center; gap: 8px;">
                    <div class="stars-outer">
                        ★★★★★
                        <div class="stars-inner" style="width: ${percentage}%">★★★★★</div>
                    </div>
                </div>
            `;
        }

        fetch(`../Shots/consolas/${consoleId}.xml`)
            .then(response => {
                if (!response.ok) throw new Error("No XML found");
                return response.text();
            })
            .then(xmlStr => {
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(xmlStr, "application/xml");

                const games = xmlDoc.querySelectorAll('game');
                const tbody = document.getElementById('gamesTbody');
                tbody.innerHTML = '';

                if (games.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" class="loading">No hay juegos listados para esta consola todavía.</td></tr>';
                    return;
                }

                games.forEach(game => {
                    const nameNode = game.querySelector('name');
                    const genreNode = game.querySelector('genre');
                    const dateNode = game.querySelector('releasedate');
                    const playersNode = game.querySelector('players');
                    const ratingNode = game.querySelector('rating');

                    const name = nameNode ? nameNode.textContent : 'Desconocido';
                    const genre = genreNode ? genreNode.textContent : '-';
                    const rawDate = dateNode ? dateNode.textContent : '';
                    const players = playersNode ? playersNode.textContent : '-';
                    const rawRating = ratingNode ? ratingNode.textContent : '';

                    gameData.push({
                        name: name,
                        genre: genre,
                        date: formatDate(rawDate),
                        rawDate: rawDate,
                        players: players,
                        ratingHtml: formatRating(rawRating),
                        rawRating: rawRating
                    });
                });

                renderTable(gameData);
            })
            .catch(error => {
                document.getElementById('gamesTbody').innerHTML = '<tr><td colspan="5" class="loading">Ocurrió un error o el archivo XML no existe.</td></tr>';
                console.error("Error fetching XML:", error);
            });

        function renderTable(data) {
            const tbody = document.getElementById('gamesTbody');
            tbody.innerHTML = '';

            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="loading">No se encontraron juegos.</td></tr>';
                return;
            }

            data.forEach(game => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><strong>${game.name}</strong></td>
                    <td>${game.genre}</td>
                    <!-- Store raw data to data- attributes for easier sorting if needed, though we sort JS array -->
                    <td>${game.date}</td>
                    <td>${game.players}</td>
                    <td>${game.ratingHtml}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        function filterGames() {
            const input = document.getElementById("searchInput");
            const filter = input.value.toLowerCase();

            const filteredData = gameData.filter(game => {
                return game.name.toLowerCase().includes(filter) || game.genre.toLowerCase().includes(filter);
            });

            renderTable(filteredData);
        }

        function sortTable(columnIndex, type) {
            const keys = ['name', 'genre', 'rawDate', 'players', 'rawRating'];
            const key = keys[columnIndex];

            sortDirection = !sortDirection;

            // Update headers to show sort icons
            const ths = document.querySelectorAll('th');
            ths.forEach(th => {
                th.classList.remove('sort-asc', 'sort-desc');
            });
            ths[columnIndex].classList.add(sortDirection ? 'sort-asc' : 'sort-desc');

            // Filter to only sort currently visible (searched) data
            const input = document.getElementById("searchInput").value.toLowerCase();
            let dataToSort = gameData.filter(game => {
                return game.name.toLowerCase().includes(input) || game.genre.toLowerCase().includes(input);
            });

            dataToSort.sort((a, b) => {
                let valA = a[key];
                let valB = b[key];

                if (type === 'number') {
                    // Handle ranges like "1-4" for players
                    valA = parseFloat(valA ? valA.split('-')[0] : 0) || 0;
                    valB = parseFloat(valB ? valB.split('-')[0] : 0) || 0;
                    return sortDirection ? valA - valB : valB - valA;
                } else if (type === 'date') {
                    valA = valA || "";
                    valB = valB || "";
                    if (valA < valB) return sortDirection ? -1 : 1;
                    if (valA > valB) return sortDirection ? 1 : -1;
                    return 0;
                } else {
                    valA = valA ? valA.toLowerCase() : "";
                    valB = valB ? valB.toLowerCase() : "";
                    if (valA < valB) return sortDirection ? -1 : 1;
                    if (valA > valB) return sortDirection ? 1 : -1;
                    return 0;
                }
            });

            renderTable(dataToSort);
        }
    </script>
</body>

</html>
